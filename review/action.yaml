name: "Codex Review — Review"
description: "Run a Codex review for a single diff chunk using openai/codex-action. Downloads prepare artifacts, invokes the review, and uploads the chunk output."

branding:
  color: "yellow"
  icon: "cpu"

inputs:
  chunk:
    description: "Chunk index to review (from the prepare action's chunk-matrix output)."
    required: true

  effort:
    description: "Reasoning effort the agent should use. Empty = Codex CLI default."
    required: false
    default: ""

  model:
    description: "OpenAI model to use. Empty = Codex CLI default."
    required: false
    default: ""

  openai-api-key:
    description: "OpenAI API key for Codex."
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: codex-prepare
        path: .codex/

    - uses: openai/codex-action@c300d2798ce5b59a7667c806b5e3a3d2c397ed2f # v1.7
      with:
        effort: ${{ inputs.effort }}
        model: ${{ inputs.model }}
        openai-api-key: ${{ inputs.openai-api-key }}
        output-file: .codex/chunk-${{ inputs.chunk }}-output.json
        output-schema-file: .codex/review-output-schema.json
        prompt-file: .codex/chunk-${{ inputs.chunk }}-prompt.md
        sandbox: read-only

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: codex-review-chunk-${{ inputs.chunk }}
        path: .codex/chunk-${{ inputs.chunk }}-output.json
        include-hidden-files: true
        retention-days: 1
