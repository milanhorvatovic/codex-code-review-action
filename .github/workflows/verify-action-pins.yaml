name: Verify Action Pins

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ratchet-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify all third-party Actions are SHA-pinned
        shell: bash
        run: |
          set -euo pipefail
          ratchet_image='ghcr.io/sethvargo/ratchet@sha256:527e78e6d29a9ac306e843cf766afe0604a0b35633f16913d85dd522218e8ca1' # v0.11.4
          # `*/action.yaml` matches at any depth — git pathspec `*` crosses `/` by default,
          # so `.github/actions/<name>/action.yaml` and `<top-level>/action.yaml` both match.
          mapfile -t files < <(
            git ls-files \
              'action.yaml' \
              '*/action.yaml' \
              '.github/workflows/*.yaml'
          )
          docker run --rm \
            --env GITHUB_ACTIONS \
            --volume "${GITHUB_WORKSPACE}:/workspace" \
            --workdir /workspace \
            "${ratchet_image}" \
            lint -format=actions "${files[@]}"

  verify-doc-pins:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-deps

      - name: Verify cross-doc third-party Action pin consistency
        run: npm run verify:doc-pins
