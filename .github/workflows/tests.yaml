name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: "npm"
          node-version: "24.14.1"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test -- --coverage

      - name: Extract coverage total
        id: coverage
        run: |
          TOTAL_RAW=$(node -e "const s = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8')); console.log(s.total.lines.pct)")
          TOTAL=$(printf '%.0f' "$TOTAL_RAW")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${TOTAL}%"

      - name: Upload coverage total
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-total
          path: coverage/coverage-summary.json
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: "npm"
          node-version: "24.14.1"

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist files exist
        run: |
          test -f dist/prepare/main.js || (echo "::error::dist/prepare/main.js not found" && exit 1)
          test -f dist/publish/main.js || (echo "::error::dist/publish/main.js not found" && exit 1)

      - name: Check dist is up-to-date
        run: |
          git diff --exit-code dist/ || (echo "::error::dist/ is out of date. Run 'npm run build' and commit the result." && exit 1)

  update-badge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-total

      - name: Update coverage badge
        run: bash .github/scripts/update-coverage-badge.sh
