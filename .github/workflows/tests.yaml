name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          cache: "npm"
          node-version: "22.22.2"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test -- --coverage

      - name: Extract coverage total
        id: coverage
        run: |
          TOTAL_RAW=$(node -e "const s = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json','utf8')); console.log(s.total.lines.pct)")
          TOTAL=$(printf '%.0f' "$TOTAL_RAW")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${TOTAL}%"

      - name: Upload coverage total
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-total
          path: coverage/coverage-summary.json
          retention-days: 1

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          cache: "npm"
          node-version: "22.22.2"

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist files exist
        run: |
          test -f dist/review/main.js || (echo "::error::dist/review/main.js not found" && exit 1)
          test -f dist/publish/main.js || (echo "::error::dist/publish/main.js not found" && exit 1)

      - name: Check dist is up-to-date
        run: |
          git diff --exit-code dist/ || (echo "::error::dist/ is out of date. Run 'npm run build' and commit the result." && exit 1)

  update-badge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: coverage-total

      - name: Update coverage badge
        run: bash .github/scripts/update-coverage-badge.sh
