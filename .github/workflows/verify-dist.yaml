name: Verify Dist

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-dist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-node-deps

      - uses: ./.github/actions/verify-dist
