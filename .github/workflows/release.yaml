name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-deps

      - uses: ./.github/actions/verify-dist

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-deps

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release for $GITHUB_REF_NAME already exists; skipping creation."
          else
            NOTES_FILE="$(mktemp)"
            npx --no-install tsx scripts/extract-changelog-section.ts "${GITHUB_REF_NAME#v}" > "$NOTES_FILE"
            PRERELEASE_FLAG=""
            case "${GITHUB_REF_NAME}" in
              *-*) PRERELEASE_FLAG="--prerelease" ;;
            esac
            gh release create "$GITHUB_REF_NAME" --notes-file "$NOTES_FILE" $PRERELEASE_FLAG
          fi

      - name: Update major version tag
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          BOT_USER_ID: ${{ vars.RELEASE_APP_BOT_USER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${BOT_USER_ID}" ]; then
            echo "::error::vars.RELEASE_APP_BOT_USER_ID is empty; refusing to push the major tag with a malformed bot email."
            exit 1
          fi
          BOT_LOGIN="codex-review-action-release-bot[bot]"
          git config user.name "${BOT_LOGIN}"
          git config user.email "${BOT_USER_ID}+${BOT_LOGIN}@users.noreply.github.com"
          TAG="${GITHUB_REF_NAME}"
          MAJOR="${TAG%%.*}"
          COMMIT="$(git rev-parse "${TAG}^{}")"
          echo "Updating $MAJOR to point at commit $COMMIT (from tag $TAG)"
          git tag -f "$MAJOR" "$COMMIT"
          git push -f origin "refs/tags/$MAJOR"

      - name: Open self-pin refresh PR
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BOT_USER_ID: ${{ vars.RELEASE_APP_BOT_USER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${BOT_USER_ID}" ]; then
            echo "::error::vars.RELEASE_APP_BOT_USER_ID is empty; refusing to open the self-pin refresh PR with a malformed bot email."
            exit 1
          fi
          BOT_LOGIN="codex-review-action-release-bot[bot]"
          git config user.name "${BOT_LOGIN}"
          git config user.email "${BOT_USER_ID}+${BOT_LOGIN}@users.noreply.github.com"
          VERSION_NUM="${GITHUB_REF_NAME#v}"
          SHA="$(git rev-parse "${GITHUB_REF_NAME}^{}")"
          BRANCH="docs/refresh-self-pins-v${VERSION_NUM}"
          git fetch origin main "+refs/heads/${BRANCH}:refs/remotes/origin/${BRANCH}" || git fetch origin main
          git checkout -B "${BRANCH}" origin/main
          npx --no-install tsx scripts/refresh-self-pins.ts "${VERSION_NUM}" "${SHA}"
          REFRESH_PATHS=(README.md .github/workflows/codex-review.yaml)
          CHANGED_PATHS=()
          for path in "${REFRESH_PATHS[@]}"; do
            if ! git diff --quiet -- "${path}"; then
              CHANGED_PATHS+=("${path}")
            fi
          done
          if [ "${#CHANGED_PATHS[@]}" -eq 0 ]; then
            echo "No self-pin updates needed; skipping refresh PR."
            exit 0
          fi
          git add -- "${CHANGED_PATHS[@]}"
          git commit -m "docs: refresh self-pin SHAs to v${VERSION_NUM}"
          if git rev-parse --verify --quiet "refs/remotes/origin/${BRANCH}" >/dev/null; then
            REMOTE_SHA="$(git rev-parse "refs/remotes/origin/${BRANCH}")"
            git push --force-with-lease="${BRANCH}:${REMOTE_SHA}" origin "${BRANCH}"
          else
            git push origin "${BRANCH}"
          fi
          if gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number' | grep -q '^[0-9]'; then
            echo "Refresh PR for ${BRANCH} already open; leaving it as-is."
            exit 0
          fi
          LABELS="release: patch,documentation"
          CHANGED_LIST=""
          for path in "${CHANGED_PATHS[@]}"; do
            CHANGED_LIST="${CHANGED_LIST}- ${path}"$'\n'
            case "${path}" in
              README.md) LABELS="${LABELS},area/readme" ;;
              .github/workflows/*) LABELS="${LABELS},area/process" ;;
            esac
          done
          BODY="Updates SHA-pinned self-references in the following files to commit ${SHA} (v${VERSION_NUM}):"$'\n\n'"${CHANGED_LIST}"$'\n'"Auto-generated by release.yaml after the v${VERSION_NUM} tag was published."
          gh pr create --base main --head "${BRANCH}" \
            --title "docs: refresh self-pin SHAs to v${VERSION_NUM}" \
            --label "${LABELS}" \
            --body "${BODY}"
