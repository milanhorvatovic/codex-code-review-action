name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-deps

      - uses: ./.github/actions/verify-dist

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

  release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-node-deps

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          NOTES_FILE="$(mktemp)"
          npx tsx scripts/extract-changelog-section.ts "${GITHUB_REF_NAME#v}" > "$NOTES_FILE"
          echo "file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release for $GITHUB_REF_NAME already exists; skipping creation."
          else
            gh release create "$GITHUB_REF_NAME" --notes-file "${{ steps.notes.outputs.file }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update major version tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          MAJOR="${TAG%%.*}"
          COMMIT="$(git rev-parse "${TAG}^{}")"
          echo "Updating $MAJOR to point at commit $COMMIT (from tag $TAG)"
          git tag -f "$MAJOR" "$COMMIT"
          git push -f origin "refs/tags/$MAJOR"
