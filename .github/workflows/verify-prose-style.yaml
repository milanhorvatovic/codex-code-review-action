name: Verify Prose Style

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify-prose-style:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-node-deps

      - name: Verify prose uses US English
        run: npm run verify:prose-style
