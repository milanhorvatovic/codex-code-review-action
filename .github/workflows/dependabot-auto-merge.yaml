name: Dependabot Auto-Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled

permissions:
  contents: read
  pull-requests: read

jobs:
  rebuild-dist:
    # Skip on label events — head SHA is unchanged, so dist/ cannot have drifted since the last
    # opened/synchronize run. Avoids a wasted no-op rebuild when a maintainer applies a label.
    if: >-
      github.event.action != 'labeled' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Disable git hooks
        run: git config --local core.hooksPath /dev/null

      - uses: ./.github/actions/setup-node-deps

      - name: Build
        run: npm run build

      - name: Detect dist changes
        id: dist
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "dist/ is already up to date; nothing to commit."
          fi

      - name: Validate rebuild-dist configuration
        if: steps.dist.outputs.changed == 'true'
        env:
          REBUILD_TOKEN: ${{ secrets.DEPENDABOT_REBUILD_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.DEPENDABOT_GPG_PRIVATE_KEY }}
          COMMITTER_NAME: ${{ vars.DEPENDABOT_GIT_COMMITTER_NAME }}
          COMMITTER_EMAIL: ${{ vars.DEPENDABOT_GIT_COMMITTER_EMAIL }}
        run: |
          missing=0
          if [ -z "$REBUILD_TOKEN" ]; then
            echo "::error::Dependabot secret DEPENDABOT_REBUILD_TOKEN is missing — required to push the rebuilt dist/ back to the PR. Create a fine-grained PAT scoped to this repo (Contents: read/write) and store it as DEPENDABOT_REBUILD_TOKEN under Settings → Secrets and variables → Dependabot."
            missing=1
          fi
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::error::Dependabot secret DEPENDABOT_GPG_PRIVATE_KEY is missing — required to sign the rebuilt dist/ commit so it satisfies main's required_signatures rule. Export an armored sign-only GPG subkey ('gpg --armor --export-secret-subkeys <subkey-id>!') and store it as DEPENDABOT_GPG_PRIVATE_KEY under Settings → Secrets and variables → Dependabot."
            missing=1
          fi
          if [ -z "$COMMITTER_NAME" ]; then
            echo "::error::Repo variable DEPENDABOT_GIT_COMMITTER_NAME is missing — required as the committer name for the signed rebuild-dist commit. Set it under Settings → Secrets and variables → Actions → Variables."
            missing=1
          fi
          if [ -z "$COMMITTER_EMAIL" ]; then
            echo "::error::Repo variable DEPENDABOT_GIT_COMMITTER_EMAIL is missing — required as the committer email for the signed rebuild-dist commit. It must match a UID on the imported GPG key and a verified email on the GitHub account that owns the public key. Set it under Settings → Secrets and variables → Actions → Variables."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Import GPG key
        if: steps.dist.outputs.changed == 'true'
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.DEPENDABOT_GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_committer_name: ${{ vars.DEPENDABOT_GIT_COMMITTER_NAME }}
          git_committer_email: ${{ vars.DEPENDABOT_GIT_COMMITTER_EMAIL }}

      - name: Commit and push dist
        if: steps.dist.outputs.changed == 'true'
        env:
          REBUILD_TOKEN: ${{ secrets.DEPENDABOT_REBUILD_TOKEN }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          git add dist/
          git commit -m "chore: rebuild dist after dependency update"
          git push "https://x-access-token:${REBUILD_TOKEN}@github.com/${REPO}.git" "HEAD:refs/heads/${BRANCH}"

  auto-merge:
    # Skip on label events — auto-merge is set once at open/synchronize time. If a maintainer later
    # applies the trust-boundary label, the disable-auto-merge-on-trust-boundary job below handles
    # revoking the previously-enabled auto-merge.
    if: >-
      github.event.action != 'labeled' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: rebuild-dist
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      # `steps.metadata.outputs.update-type` is the most-severe per-dep type across the group.
      # The dogfood self-reference bumps SHA→SHA under the same prerelease tag, which
      # fetch-metadata conservatively reports as semver-major. Treating that as "major" for
      # gating purposes blocks otherwise-safe grouped patches and standalone self-bumps.
      #
      # Walk `updated-dependencies-json` instead and pick the most-severe update-type after
      # excluding the self-reference *only* when its bump is SHA-only same-version
      # (`prevVersion == newVersion`). Real major bumps of the self-reference still classify
      # as semver-major and route to manual review. The self-reference is identified via
      # `github.repository` so a rename/transfer/fork picks up the new name automatically.
      - name: Derive effective update-type
        id: effective
        env:
          SELF_DEPENDENCY: ${{ github.repository }}
          UPDATED_JSON: ${{ steps.metadata.outputs.updated-dependencies-json }}
        run: |
          set -euo pipefail
          effective=$(jq -r --arg self "$SELF_DEPENDENCY" '
            [.[]
              | select(.dependencyName != $self or .prevVersion != .newVersion)
              | .updateType]
            | if any(. == "version-update:semver-major") then "version-update:semver-major"
              elif any(. == "version-update:semver-minor") then "version-update:semver-minor"
              elif any(. == "version-update:semver-patch") then "version-update:semver-patch"
              else "version-update:semver-patch"
              end
          ' <<<"$UPDATED_JSON")
          echo "update-type=$effective" >> "$GITHUB_OUTPUT"

      # See CONTRIBUTING.md → Trust-boundary changes for the policy.
      # Two guards coexist intentionally:
      #   1. Exclude-by-name: skip auto-merge for any (possibly grouped) bump that includes
      #      `openai/codex-action`. Extend this list when a new trust-boundary dependency
      #      is added to the repo.
      #   2. Label guard: skip auto-merge for any PR a maintainer has manually labeled
      #      `trust-boundary`, even if the dep is not yet on the exclude list.
      # The `if:` clauses below evaluate against the event payload captured at workflow start.
      # That payload can be stale by the time this step runs (label applied during the run).
      # The runtime checks inside `run:` close that TOCTOU race — see the comments there.
      #
      # Auto-approval runs before auto-merge enable so that, by the time auto-merge fires,
      # the required code-owner review is already in place. The repo's branch ruleset on
      # `main` requires one approving review with code-owner approval, and `GITHUB_TOKEN`
      # cannot approve PRs (Dependabot also cannot approve its own). A separately-issued
      # PAT belonging to a code-owner is required and must be stored as a *Dependabot*
      # secret (workflows triggered by Dependabot do not have access to Actions secrets).
      # When the secret is unset, the step warns and skips — auto-merge is still enabled
      # and the PR waits for manual approval, matching the prior behavior.
      - name: Approve PR (so required-review check passes)
        id: approve
        if: >-
          steps.effective.outputs.update-type != 'version-update:semver-major'
          && !contains(steps.metadata.outputs.dependency-names, 'openai/codex-action')
          && !contains(github.event.pull_request.labels.*.name, 'trust-boundary')
        env:
          GH_TOKEN: ${{ secrets.DEPENDABOT_APPROVE_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        # This step is intentionally fail-open: any failure (missing token, revoked PAT,
        # insufficient PAT scope, transient GitHub API error, malformed response) emits a
        # warning and exits 0. A hard failure here would cause GitHub Actions to skip the
        # subsequent merge step entirely; the merge step's fallback path (which depends on
        # this step's `succeeded` output) handles the unhappy case by enabling GitHub
        # auto-merge so a later manual approval can fire the merge.
        #
        # The step writes a `succeeded=true|false` output via an EXIT trap so the merge
        # step downstream knows whether a code-owner review was posted: `true` ⇒ proceed
        # with synchronous merge; `false` ⇒ fall back to `gh pr merge --auto`. Without
        # this signal, the synchronous merge would fail the workflow on missing-approval
        # and the PR would strand because this workflow doesn't trigger on review events.
        #
        # GitHub Actions invokes the default bash shell as `bash --noprofile --norc -eo
        # pipefail {0}`, so errexit is on by default. We explicitly disable it (`set +e`)
        # because future edits could add an unwrapped `gh` call and silently regress the
        # fail-open invariant. Every external command below is independently guarded with
        # `if !` and emits a warning before `exit 0`; preserve that pattern when extending.
        run: |
          set +e
          set -uo pipefail
          succeeded=false
          trap 'echo "succeeded=$succeeded" >> "$GITHUB_OUTPUT"' EXIT
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::DEPENDABOT_APPROVE_TOKEN is not set — skipping auto-approval. The PR will require manual review before auto-merge can complete. Configure a fine-grained PAT scoped to this repo (Pull requests: write) belonging to a code-owner and store it under Settings → Secrets and variables → Dependabot → DEPENDABOT_APPROVE_TOKEN."
            exit 0
          fi
          if ! label_state=$(gh pr view "$PR_URL" --json labels --jq 'any(.labels[]; .name == "trust-boundary")'); then
            echo "::warning::Failed to query trust-boundary label state; skipping auto-approval. Auto-merge will still be attempted; the PR will wait for manual review if approval cannot be posted."
            exit 0
          fi
          if [ "$label_state" = "true" ]; then
            echo "trust-boundary label is now present (applied after workflow start); skipping auto-approval."
            exit 0
          fi
          if ! gh pr review --approve --body "Auto-approved by the Dependabot Auto-Merge workflow (non-major, non-trust-boundary update)." "$PR_URL"; then
            echo "::warning::Failed to post auto-approval review (likely a revoked or insufficiently-scoped DEPENDABOT_APPROVE_TOKEN, or a transient GitHub API error). Auto-merge will still be enabled; the PR will wait for manual review."
            exit 0
          fi
          succeeded=true

      # Two paths, branching on whether the auto-approval step posted a code-owner review:
      #
      # Happy path (approval succeeded): wait for every required status check to reach a
      # terminal state, then squash-merge synchronously inside this workflow run. Merging
      # inline under the bot's still-valid GITHUB_TOKEN eliminates the enable→fire race in
      # GitHub's server-side auto-merge worker, which occasionally failed to fire after the
      # last required check transitioned green and left the PR open with auto-merge enabled
      # but no merge attempt and no failure event (see PR #114 for a confirmed instance).
      #
      # Fallback path (approval did not succeed — fail-open from the previous step): the PR
      # is missing the required code-owner review, so a synchronous merge would fail the
      # workflow and the PR would strand because this workflow doesn't trigger on review
      # events. Fall back to enabling GitHub auto-merge so a later manual approval fires
      # the merge — the same behavior as before the synchronous-merge change. This loses
      # the no-stall guarantee on the unhappy path but is strictly better than failing the
      # workflow and leaving the PR unmerge-able.
      #
      # Trust-boundary handling on the happy path: the label is re-checked twice — once
      # before polling (so we don't waste minutes waiting on a PR we won't merge) and again
      # immediately before the merge (closing the race where a maintainer applies the label
      # while checks run). On the fallback path the original post-enable revert is kept.
      #
      # A residual TOCTOU window remains on the happy path — between the second label
      # re-check and `gh pr merge --squash`, a few milliseconds of inter-command latency.
      # This is no worse than the prior `--auto` design, which had an equivalent (and
      # often longer) window between auto-merge enable and the reactive `--disable-auto`
      # revert: GitHub's auto-merge worker can fire the merge before the workflow reaches
      # the post-check, and the reactive job below can fire too late to undo it. Closing
      # this window atomically requires elevating the trust-boundary policy to a required
      # status check so the ruleset itself refuses the merge — left as future work.
      - name: Wait for required checks, then squash-merge
        if: >-
          steps.effective.outputs.update-type != 'version-update:semver-major'
          && !contains(steps.metadata.outputs.dependency-names, 'openai/codex-action')
          && !contains(github.event.pull_request.labels.*.name, 'trust-boundary')
        env:
          APPROVE_SUCCEEDED: ${{ steps.approve.outputs.succeeded }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          has_trust_boundary() {
            gh pr view "$PR_URL" --json labels --jq 'any(.labels[]; .name == "trust-boundary")'
          }
          if [ "$(has_trust_boundary)" = "true" ]; then
            echo "trust-boundary label is now present (applied after workflow start); skipping merge."
            exit 0
          fi
          if [ "${APPROVE_SUCCEEDED:-false}" != "true" ]; then
            echo "::warning::Auto-approval did not succeed; falling back to GitHub auto-merge so a maintainer's later approval can fire the merge."
            gh pr merge --auto --squash "$PR_URL"
            if [ "$(has_trust_boundary)" = "true" ]; then
              echo "trust-boundary label was applied while enabling auto-merge; reverting."
              gh pr merge --disable-auto "$PR_URL"
            fi
            exit 0
          fi
          # `--required` filters to checks listed in the branch ruleset's required_status_checks.
          # `--watch` polls until each reaches a terminal conclusion. `--fail-fast` aborts on the
          # first required check that fails, surfacing the failure rather than waiting on the rest.
          gh pr checks "$PR_URL" --required --watch --fail-fast
          if [ "$(has_trust_boundary)" = "true" ]; then
            echo "trust-boundary label was applied while waiting for checks; skipping merge."
            exit 0
          fi
          gh pr merge --squash "$PR_URL"

  # Reactive disable: if a maintainer applies the `trust-boundary` label after auto-merge has
  # already been enabled by the auto-merge job above, the label-guard `if:` on that step only
  # prevents re-enabling — it does not revoke a previously-enabled auto-merge. This job runs on
  # the `labeled` pull_request event and explicitly disables auto-merge so the PR stays open
  # for manual maintainer review and merging.
  #
  # A previously-posted auto-approval review (from the approve step above) is intentionally
  # left in place. Disabling auto-merge is sufficient to stop the automatic merge; the
  # ruleset's `dismiss_stale_reviews_on_push: true` will clear the bot review on the next push,
  # and the maintainer who applied the label can dismiss it manually if they want a clean
  # review state before re-evaluating.
  disable-auto-merge-on-trust-boundary:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'trust-boundary' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Pre-check whether auto-merge is currently enabled. Auto-merge may legitimately not be set
      # — e.g. semver-major bumps that the auto-merge job already excluded, or grouped bumps that
      # already contained `openai/codex-action` and hit the exclude-by-name guard at open time.
      # In those cases `gh pr merge --disable-auto` errors out and would fail this job for no
      # operational reason. Skip cleanly when there is nothing to disable.
      - name: Disable auto-merge if enabled
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_URL: "${{ github.event.pull_request.html_url }}"
        # Bash strict mode so a transient `gh pr view` failure aborts the job rather than
        # silently leaving `auto_merge` empty and falling through to a misleading
        # `--disable-auto` error.
        run: |
          set -euo pipefail
          auto_merge=$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest')
          if [ "$auto_merge" = "null" ]; then
            echo "Auto-merge is not enabled on this PR; nothing to disable."
            exit 0
          fi
          gh pr merge --disable-auto "$PR_URL"
