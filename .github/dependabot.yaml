version: 2

updates:
  - commit-message:
      prefix: "chore"
    directory: "/"
    package-ecosystem: "github-actions"
    groups:
      github-actions:
        exclude-patterns:
          # Keep the dogfood self-reference out of the third-party group: it bumps
          # SHA→SHA under the same `v2.1.0-pre` tag, which dependabot/fetch-metadata
          # classifies as semver-major and otherwise poisons the grouped update-type.
          - "milanhorvatovic/codex-ai-code-review-action"
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
      - "release: patch"
    schedule:
      day: "monday"
      interval: "weekly"
    target-branch: "main"

  - commit-message:
      prefix: "chore"
    directory: "/"
    package-ecosystem: "npm"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    labels:
      - "dependencies"
      - "npm"
      - "release: patch"
    schedule:
      day: "monday"
      interval: "weekly"
    target-branch: "main"
    versioning-strategy: "increase"
